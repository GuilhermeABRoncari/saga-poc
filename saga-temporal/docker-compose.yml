services:
  mariadb:
    image: mariadb:11.4
    environment:
      MARIADB_ROOT_PASSWORD: temporal
      MARIADB_USER: temporal
      MARIADB_PASSWORD: temporal
      MARIADB_DATABASE: temporal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.26
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB: mysql8
      DB_PORT: 3306
      MYSQL_USER: temporal
      MYSQL_PWD: temporal
      MYSQL_SEEDS: mariadb
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  temporal-ui:
    image: temporalio/ui:2.35.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8088
    ports:
      - "8088:8080"

  workflow-worker:
    build: .
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      WORKER_SCRIPT: workflow-worker.php
    command: ["rr", "serve", "-c", ".rr.yaml"]

  service-a-worker:
    build: .
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      WORKER_SCRIPT: service-a-worker.php
      FORCE_FAIL: ${FORCE_FAIL:-}
      SLOW_RESERVE_STOCK: ${SLOW_RESERVE_STOCK:-0}
      SLOW_COMPENSATION: ${SLOW_COMPENSATION:-0}
    command: ["rr", "serve", "-c", ".rr.yaml"]

  service-b-worker:
    build: .
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      WORKER_SCRIPT: service-b-worker.php
      FAIL_COMPENSATION: ${FAIL_COMPENSATION:-}
      SLOW_COMPENSATION: ${SLOW_COMPENSATION:-0}
    command: ["rr", "serve", "-c", ".rr.yaml"]

  alerter:
    build: .
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      ALERT_LOG: /app/storage/alerts.log
      ALERT_POLL_INTERVAL: 2
    volumes:
      - ./storage:/app/storage
    command: ["php", "bin/alerter.php"]
