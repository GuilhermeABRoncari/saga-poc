services:
  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "temporal"]
      interval: 5s
      timeout: 3s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.26
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgresql
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.35.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8088
    ports:
      - "8088:8080"

  workflow-worker:
    build: .
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      WORKER_SCRIPT: workflow-worker.php
    command: ["rr", "serve", "-c", ".rr.yaml"]

  service-a-worker:
    build: .
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      WORKER_SCRIPT: service-a-worker.php
      FORCE_FAIL: ${FORCE_FAIL:-}
      SLOW_RESERVE_STOCK: ${SLOW_RESERVE_STOCK:-0}
    command: ["rr", "serve", "-c", ".rr.yaml"]

  service-b-worker:
    build: .
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      WORKER_SCRIPT: service-b-worker.php
    command: ["rr", "serve", "-c", ".rr.yaml"]
