services:
  # NOTA: Temporal NÃO suporta MariaDB (validado em 2026-05-04 — schema do auto-setup
  # falha em CREATE INDEX com path JSON no driver mysql8 contra MariaDB 11.4).
  # Banco oficial suportado: PostgreSQL, MySQL 8 ou Cassandra. A empresa usa MariaDB
  # em produção, então adoção de Temporal exige um 2º SGBD dedicado ao engine.
  # Ver findings-temporal.md §2.2.6 para análise do impacto na decisão.
  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "temporal"]
      interval: 5s
      timeout: 3s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.26
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgresql
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  temporal-ui:
    image: temporalio/ui:2.35.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8088
    ports:
      - "8088:8080"

  workflow-worker:
    build: .
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      WORKER_SCRIPT: workflow-worker.php
    command: ["rr", "serve", "-c", ".rr.yaml"]

  service-a-worker:
    build: .
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      WORKER_SCRIPT: service-a-worker.php
      FORCE_FAIL: ${FORCE_FAIL:-}
      SLOW_RESERVE_STOCK: ${SLOW_RESERVE_STOCK:-0}
      SLOW_COMPENSATION: ${SLOW_COMPENSATION:-0}
    command: ["rr", "serve", "-c", ".rr.yaml"]

  service-b-worker:
    build: .
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      WORKER_SCRIPT: service-b-worker.php
      FAIL_COMPENSATION: ${FAIL_COMPENSATION:-}
      SLOW_COMPENSATION: ${SLOW_COMPENSATION:-0}
    command: ["rr", "serve", "-c", ".rr.yaml"]

  alerter:
    build: .
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      ALERT_LOG: /app/storage/alerts.log
      ALERT_POLL_INTERVAL: 2
    volumes:
      - ./storage:/app/storage
    command: ["php", "bin/alerter.php"]
