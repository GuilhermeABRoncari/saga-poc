services:
  # Stack alternativa para validar Temporal × MySQL 8 (vs Postgres do compose principal).
  # Uso: docker compose -f docker-compose.mysql.yml up -d --build
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: temporal
    command: ["--default-authentication-plugin=mysql_native_password"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptemporal"]
      interval: 5s
      timeout: 3s
      retries: 30

  temporal:
    image: temporalio/auto-setup:1.26
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB: mysql8
      DB_PORT: 3306
      MYSQL_USER: root
      MYSQL_PWD: temporal
      MYSQL_SEEDS: mysql
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  temporal-ui:
    image: temporalio/ui:2.35.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8088
    ports:
      - "8088:8080"

  workflow-worker:
    build: .
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      WORKER_SCRIPT: workflow-worker.php
    command: ["rr", "serve", "-c", ".rr.yaml"]

  service-a-worker:
    build: .
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      WORKER_SCRIPT: service-a-worker.php
      FORCE_FAIL: ${FORCE_FAIL:-}
    command: ["rr", "serve", "-c", ".rr.yaml"]

  service-b-worker:
    build: .
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      WORKER_SCRIPT: service-b-worker.php
    command: ["rr", "serve", "-c", ".rr.yaml"]
